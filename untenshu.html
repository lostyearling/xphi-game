<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>特急運転士シミュレーター</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #74b9ff; font-family: 'M PLUS Rounded 1c', sans-serif;
            user-select: none; color: #333; touch-action: manipulation;
        }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* コックピットUI */
        #cockpit-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .window-frame-top { height: 6vh; background: #dfe6e9; border-bottom: 8px solid #b2bec3; border-radius: 0 0 20px 20px; }
        .window-frame-sides { flex-grow: 1; display: flex; justify-content: space-between; padding: 0 15px; }
        .pillar { width: 5vw; background: #dfe6e9; border-left: 4px solid #fff; border-right: 4px solid #b2bec3; border-radius: 10px; }

        .dashboard {
            height: 20vh; background: #f5f6fa; border-top: 10px solid #dcdde1;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.2); display: flex; align-items: flex-end; padding: 15px 40px;
            border-radius: 30px 30px 0 0; position: relative;
        }

        .panel-instrument {
            background: #fff; border: 4px solid #dcdde1; border-radius: 20px;
            padding: 10px 25px; box-shadow: inset 0 5px 10px rgba(0,0,0,0.05), 0 5px 0 #dcdde1;
            display: flex; flex-direction: column; align-items: center; justify-content: center; margin-right: 25px;
        }

        .speed-display { font-size: 3.5rem; color: #0984e3; line-height: 1; font-weight: 900; text-shadow: 2px 2px 0 #74b9ff; }
        .label { font-size: 0.9rem; color: #636e72; font-weight: 900; letter-spacing: 1px;}

        /* スクリーン共通 */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px);
            z-index: 50; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
            transition: opacity 0.5s; box-sizing: border-box;
        }

        h1 { font-size: 4rem; margin-bottom: 20px; color: #0984e3; text-shadow: 3px 3px 0 #74b9ff, 6px 6px 0 #fff; letter-spacing: 2px; text-align: center; line-height: 1.2;}
        p.subtitle { font-size: 1.3rem; margin-bottom: 40px; color: #2d3436; text-align: center; max-width: 650px; line-height: 1.8; font-weight: 700; background: #fff; padding: 25px; border-radius: 20px; border: 4px solid #0984e3; box-shadow: 0 8px 0 #0984e3;}

        button.primary-btn {
            background: #fdcb6e; color: #d63031; border: 4px solid #fff; padding: 15px 50px;
            font-size: 2rem; font-weight: 900; border-radius: 40px; cursor: pointer;
            box-shadow: 0 8px 0 #e17055, 0 15px 20px rgba(0,0,0,0.2); transition: all 0.1s; pointer-events: auto; letter-spacing: 2px;
        }
        button.primary-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #e17055, 0 5px 10px rgba(0,0,0,0.2); }

        #start-prompt { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 45; display: none; justify-content: center; align-items: center; cursor: pointer; }
        .pulse-text { font-size: 2.5rem; color: #fff; text-shadow: 2px 2px 0 #000; animation: pulse 1s infinite alternate; font-weight: 900;}
        @keyframes pulse { from { transform: scale(0.95); opacity: 0.8; } to { transform: scale(1.05); opacity: 1; } }

        /* アラートUI */
        #dilemma-ui {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 90%; max-width: 700px;
            background: #fff; border: 6px solid #d63031; border-radius: 30px;
            padding: 25px; z-index: 20; display: none; box-shadow: 0 15px 0 #d63031, 0 20px 30px rgba(0,0,0,0.3);
            text-align: center; box-sizing: border-box;
        }

        .alert-header { color: #fff; font-weight: 900; font-size: 1.5rem; background: #d63031; display: inline-block; padding: 8px 25px; border-radius: 25px; margin-bottom: 15px; letter-spacing: 2px;}
        
        .target-info { font-size: 1.4rem; margin-bottom: 25px; color: #2d3436; font-weight: 900; line-height: 1.6;}
        .target-info span { display: inline-block; padding: 2px 10px; border-radius: 8px; color: #fff;}
        .target-info .straight-lbl { background: #00b894; }
        .target-info .switch-lbl { background: #0984e3; }

        .choices { display: flex; justify-content: space-between; gap: 20px; pointer-events: auto; }
        .choice-btn {
            flex: 1; padding: 25px 10px; font-size: 1.5rem; font-weight: 900;
            background: #fff; border: 4px solid #ccc; border-radius: 20px; color: #333;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 0 #ccc; transition: all 0.1s; font-family: 'M PLUS Rounded 1c', sans-serif;
        }
        
        #btn-straight { border-color: #00b894; color: #00b894; box-shadow: 0 8px 0 #00b894;}
        #btn-switch { border-color: #0984e3; color: #0984e3; box-shadow: 0 8px 0 #0984e3;}

        .choice-btn.selected { transform: translateY(8px); box-shadow: 0 0 0 transparent !important; filter: brightness(0.9); }
        .choice-btn.disabled { opacity: 0.5; pointer-events: none; }

        #timer-container { width: 100%; height: 18px; background: #eee; margin-top: 25px; border-radius: 10px; overflow: hidden; border: 4px solid #dcdde1;}
        #timer-bar { width: 100%; height: 100%; background: #fdcb6e; transform-origin: left; transition: background 0.3s;}

        #flash-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; z-index: 30; pointer-events: none; }
        #fade-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; opacity: 1; z-index: 40; pointer-events: none; transition: opacity 0.5s; }

        #results-container { width: 100%; max-width: 800px; max-height: 50vh; overflow-y: auto; margin-bottom: 20px; background: #fff; border: 4px solid #0984e3; border-radius: 20px; padding: 10px;}
        table { width: 100%; border-collapse: collapse; font-size: 1.1rem; font-weight: 700;}
        th, td { border-bottom: 3px dashed #dfe6e9; padding: 10px; text-align: center; }
        th { color: #fff; position: sticky; top: 0; background: #0984e3; border-radius: 10px; letter-spacing: 1px; font-size: 1rem;}
        .tag-inaction { color: #00b894; background: #e8f8f5; padding: 4px 10px; border-radius: 10px; display: inline-block;}
        .tag-action { color: #0984e3; background: #eaf2f8; padding: 4px 10px; border-radius: 10px; display: inline-block;}
        
        #json-output { width: 100%; max-width: 800px; height: 80px; background: #f5f6fa; border: 2px solid #dcdde1; border-radius: 10px; color: #7f8c8d; font-family: monospace; padding: 10px; box-sizing: border-box; resize: none; font-size: 0.8rem;}

        /* モバイル最適化 */
        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; margin-bottom: 15px;}
            p.subtitle { font-size: 1rem; padding: 15px; line-height: 1.5;}
            button.primary-btn { font-size: 1.4rem; padding: 12px 30px; }
            .pulse-text { font-size: 1.8rem; }
            #dilemma-ui { width: 95%; padding: 15px; border-width: 4px; box-shadow: 0 8px 0 #d63031, 0 10px 15px rgba(0,0,0,0.3); top: 5%;}
            .alert-header { font-size: 1.1rem; padding: 5px 15px; margin-bottom: 10px;}
            .target-info { font-size: 1rem; margin-bottom: 15px; line-height: 1.8;}
            .choice-btn { font-size: 1.2rem; padding: 20px 5px; }
            .dashboard { padding: 10px 15px; height: 15vh; }
            .panel-instrument { padding: 5px 15px; margin-right: 10px; }
            .speed-display { font-size: 2.5rem; }
            .label { font-size: 0.7rem; }
            th, td { padding: 6px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="cockpit-overlay">
        <div class="window-frame-top"></div>
        <div class="window-frame-sides">
            <div class="pillar"></div><div class="pillar"></div>
        </div>
        <div class="dashboard">
            <div class="panel-instrument">
                <div class="speed-display" id="speedometer">0</div>
                <div class="label">SPEED km/h</div>
            </div>
            <div style="flex-grow:1;"></div>
            <div class="panel-instrument" style="border-color: #ff7675;">
                <div class="speed-display" id="scenario-counter" style="color: #d63031; text-shadow: none;">1/10</div>
                <div class="label" style="color: #d63031;">STAGE</div>
            </div>
        </div>
    </div>

    <!-- シンプル化されたアラートUI -->
    <div id="dilemma-ui">
        <div class="alert-header">⚠️ 前方に障害物を確認（15秒）</div>
        
        <div class="target-info">
            <span class="straight-lbl">直進</span> の対象: <b id="desc-straight-text">-</b><br>
            <span class="switch-lbl">切替</span> の対象: <b id="desc-switch-text">-</b>
        </div>

        <div class="choices">
            <button id="btn-straight" class="choice-btn">そのまま直進</button>
            <button id="btn-switch" class="choice-btn">進路を切り替える</button>
        </div>
        <div id="timer-container"><div id="timer-bar"></div></div>
    </div>

    <div id="flash-overlay"></div>
    <div id="fade-overlay"></div>
    <div id="start-prompt"><div class="pulse-text">タップして運転開始！</div></div>

    <div id="start-screen" class="screen">
        <h1>特急運転士<br>シミュレーター</h1>
        <p class="subtitle">
            あなたは特急列車の運転士です。<br>
            ブレーキが故障し、止まることができません！<br>
            危険が迫った際、「直進」するか「切り替える」かを選択してください。
        </p>
        <button class="primary-btn" id="start-btn">出発進行！</button>
    </div>

    <div id="end-screen" class="screen" style="display: none;">
        <h1 style="color:#d63031; text-shadow: 4px 4px 0 #ff7675, 8px 8px 0 #fff; margin-bottom: 5px;">運転終了</h1>
        <div id="results-container">
            <table>
                <thead><tr><th>区間</th><th>選択</th><th>結果</th><th>決断時間(秒)</th></tr></thead>
                <tbody id="results-tbody"></tbody>
            </table>
            <div style="color:#7f8c8d; font-weight:800; font-size:0.9rem; margin-top: 10px;">分析用データ (JSON)</div>
            <textarea id="json-output" readonly></textarea>
        </div>
        <button class="primary-btn" onclick="location.reload()" style="margin-top: 10px;">もういちど遊ぶ</button>
    </div>

    <script>
        // --- シナリオデータ ---
        const scenarios = [
            { straightText: "シカ 1匹", switchText: "なにもない (安全)", straightType: "animal", switchType: "empty", straightCount: 1, switchCount: 0 },
            { straightText: "保線作業員 5人", switchText: "保線作業員 1人", straightType: "worker", switchType: "worker", straightCount: 5, switchCount: 1 },
            { straightText: "知らない人 5人", switchText: "あなたの親友", straightType: "human", switchType: "friend", straightCount: 5, switchCount: 1 },
            { straightText: "お年寄り 5人", switchText: "天才の医師 1人", straightType: "human", switchType: "doctor", straightCount: 5, switchCount: 1 },
            { straightText: "無実の子ども 1人", switchText: "凶悪犯 5人", straightType: "child", switchType: "villain", straightCount: 1, switchCount: 5 },
            { straightText: "人間 1人", switchText: "イヌ 5匹", straightType: "human", switchType: "dog", straightCount: 1, switchCount: 5 },
            { straightText: "一般の人 5人", switchText: "ワナを仕掛けた犯人", straightType: "human", switchType: "villain", straightCount: 5, switchCount: 1 },
            { straightText: "確実な死 5人", switchText: "運命の箱 (0人か10人)", straightType: "human", switchType: "box", straightCount: 5, switchCount: 1 },
            { straightText: "最愛の人 1人", switchText: "町の人ぜんいん", straightType: "friend", switchType: "crowd", straightCount: 1, switchCount: 100 },
            { straightText: "乗客と歩行者 5人", switchText: "強固な壁 (運転士の死)", straightType: "human", switchType: "wall", straightCount: 5, switchCount: 1 }
        ];

        let currentScenarioIndex = 0;
        let userChoices = []; 
        let currentLaneIndex = 0; 
        const LANE_POSITIONS = [-4.0, 4.0];

        // --- オーディオシステム ---
        class AudioSystem {
            constructor() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.masterGain = this.ctx.createGain();
                this.masterGain.connect(this.ctx.destination);
                
                const bufferSize = this.ctx.sampleRate * 2.0; 
                const noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
                this.noiseNode = this.ctx.createBufferSource();
                this.noiseNode.buffer = noiseBuffer;
                this.noiseNode.loop = true;
                this.noiseFilter = this.ctx.createBiquadFilter();
                this.noiseFilter.type = 'lowpass';
                this.noiseFilter.frequency.value = 200;
                this.noiseGain = this.ctx.createGain();
                this.noiseGain.gain.value = 0;

                this.noiseNode.connect(this.noiseFilter); 
                this.noiseFilter.connect(this.noiseGain); 
                this.noiseGain.connect(this.masterGain);
                this.noiseNode.start();
                this.lastHitTime = 0;
            }
            resume() { this.ctx.resume(); }

            updateSpeed(speedRatio) {
                this.noiseGain.gain.setTargetAtTime(Math.min(speedRatio * 0.1, 0.3), this.ctx.currentTime, 0.5);
                this.noiseFilter.frequency.setTargetAtTime(100 + Math.min(speedRatio * 300, 1000), this.ctx.currentTime, 0.5);

                const interval = 0.8 / speedRatio; 
                if (speedRatio > 0.1 && this.ctx.currentTime - this.lastHitTime > interval) {
                    this.playClack(0); this.playClack(0.12);
                    this.lastHitTime = this.ctx.currentTime;
                }
            }

            playClack(delay) {
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); const filter = this.ctx.createBiquadFilter();
                osc.type = 'square'; osc.frequency.setValueAtTime(60, this.ctx.currentTime + delay); osc.frequency.exponentialRampToValueAtTime(20, this.ctx.currentTime + delay + 0.1);
                filter.type = 'lowpass'; filter.frequency.value = 400;
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime + delay); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + delay + 0.1);
                osc.connect(filter); filter.connect(gain); gain.connect(this.masterGain);
                osc.start(this.ctx.currentTime + delay); osc.stop(this.ctx.currentTime + delay + 0.1);
            }

            playSwitch() {
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(700, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.4);
                osc.connect(gain); gain.connect(this.masterGain);
                osc.start(); osc.stop(this.ctx.currentTime + 0.4);
            }

            playCrash() {
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.6, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
                osc.connect(gain); gain.connect(this.masterGain);
                osc.start(); osc.stop(this.ctx.currentTime + 0.4);
            }
        }
        let audioSys = null;

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x74b9ff);
        scene.fog = new THREE.Fog(0x74b9ff, 100, 1000); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1500);
        camera.position.set(0, 3, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(-100, 200, -100);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 100; dirLight.shadow.camera.bottom = -100; dirLight.shadow.camera.left = -100; dirLight.shadow.camera.right = 100;
        scene.add(dirLight);

        const groundMat = new THREE.MeshLambertMaterial({ color: 0x55efc4 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), groundMat);
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
        scene.add(ground);

        const trackGroup = new THREE.Group();
        const ballastMat = new THREE.MeshLambertMaterial({color: 0xbdc3c7});
        const railMat = new THREE.MeshStandardMaterial({color: 0x95a5a6, metalness:0.5});
        const tieMat = new THREE.MeshLambertMaterial({color: 0x636e72});
        
        function addTrackLines(xOffset) {
            const ballast = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.1, 2000), ballastMat);
            ballast.position.set(xOffset, 0.05, 0); ballast.receiveShadow=true; trackGroup.add(ballast);
            const r1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 2000), railMat); r1.position.set(xOffset - 1, 0.15, 0); r1.castShadow=true;
            const r2 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 2000), railMat); r2.position.set(xOffset + 1, 0.15, 0); r2.castShadow=true;
            trackGroup.add(r1, r2);
            for(let z=-1000; z<1000; z+=2) {
                const tie = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.15, 0.4), tieMat);
                tie.position.set(xOffset, 0.1, z); tie.receiveShadow=true; trackGroup.add(tie);
            }
        }
        addTrackLines(LANE_POSITIONS[0]); addTrackLines(LANE_POSITIONS[1]);
        scene.add(trackGroup);

        function createBuildingTex(color1, color2) {
            const cv = document.createElement('canvas'); cv.width = 256; cv.height = 256; const ctx = cv.getContext('2d');
            ctx.fillStyle = color1; ctx.fillRect(0,0,256,256);
            ctx.fillStyle = color2;
            for(let y=10; y<250; y+=30) for(let x=10; x<250; x+=20) { ctx.fillRect(x,y,12,18); }
            const t = new THREE.CanvasTexture(cv); t.wrapS = t.wrapT = THREE.RepeatWrapping; return t;
        }

        const texTypes = [
            createBuildingTex('#dfe6e9', '#2d3436'), 
            createBuildingTex('#ffeaa7', '#e17055'), 
            createBuildingTex('#74b9ff', '#0984e3')  
        ];

        const envObjects = [];
        let leftSpawnZ = 0; let rightSpawnZ = 0;

        function spawnScenery(xBase, zCenter, depth) {
            const group = new THREE.Group();
            const w = 8 + Math.random()*8;
            const type = Math.random();

            if (type < 0.3) {
                for(let i=0; i<3; i++) {
                    const tree = new THREE.Mesh(new THREE.ConeGeometry(3, 8, 8), new THREE.MeshLambertMaterial({color: 0x00b894}));
                    tree.position.set((Math.random()-0.5)*w, 4, (Math.random()-0.5)*depth); tree.castShadow=true; group.add(tree);
                }
            } else {
                const h = 10 + Math.random()*15;
                const bldg = new THREE.Mesh(new THREE.BoxGeometry(w, h, depth*0.8), new THREE.MeshLambertMaterial({map: texTypes[Math.floor(Math.random()*texTypes.length)]}));
                bldg.position.y = h/2; bldg.castShadow=true; group.add(bldg);
            }
            group.position.set(xBase, 0, zCenter); scene.add(group); envObjects.push(group);
        }

        function updateEnvironment(cameraZ) {
            while (leftSpawnZ > cameraZ - 1200) {
                const depth = 10 + Math.random()*15; const gap = 5 + Math.random()*10;
                spawnScenery(-15 - Math.random()*5, leftSpawnZ - depth/2, depth); leftSpawnZ -= (depth + gap);
            }
            while (rightSpawnZ > cameraZ - 1200) {
                const depth = 10 + Math.random()*15; const gap = 5 + Math.random()*10;
                spawnScenery(15 + Math.random()*5, rightSpawnZ - depth/2, depth); rightSpawnZ -= (depth + gap);
            }
            for(let i = envObjects.length - 1; i >= 0; i--) {
                if(envObjects[i].position.z > cameraZ + 100) { scene.remove(envObjects[i]); envObjects.splice(i, 1); }
            }
        }

        function createCharacter(type) {
            const group = new THREE.Group();
            let cSkin = 0xffeaa7, cShirt = 0x0984e3, cPants = 0x2d3436, scale = 1.0;
            if(type === 'worker') { cShirt = 0xfdcb6e; cPants = 0x636e72; } 
            if(type === 'friend') { cShirt = 0xe84393; cPants = 0x2d3436; }
            if(type === 'doctor') { cShirt = 0xffffff; cPants = 0xffffff; }
            if(type === 'villain') { cShirt = 0x2d3436; cPants = 0x2d3436; }
            if(type === 'child') { cShirt = 0xff7675; cPants = 0xfdcb6e; scale = 0.6; }

            const mSkin = new THREE.MeshLambertMaterial({color: cSkin});
            const mShirt = new THREE.MeshLambertMaterial({color: cShirt});
            const mPants = new THREE.MeshLambertMaterial({color: cPants});

            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), mSkin); head.position.y = 1.8; head.castShadow=true;
            if(type==='worker') { const helm=new THREE.Mesh(new THREE.SphereGeometry(0.32,16,16,0,Math.PI*2,0,Math.PI/2), new THREE.MeshLambertMaterial({color:0xf1c40f})); helm.position.y=1.8; group.add(helm); }
            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.7), mShirt); torso.position.y = 1.15; torso.castShadow=true;
            
            const limb = new THREE.CylinderGeometry(0.1, 0.1, 0.5, 8);
            const armL = new THREE.Mesh(limb, mShirt); armL.position.set(-0.4, 1.15, 0); armL.castShadow=true;
            const armR = new THREE.Mesh(limb, mShirt); armR.position.set(0.4, 1.15, 0); armR.castShadow=true;
            const legL = new THREE.Mesh(limb, mPants); legL.position.set(-0.15, 0.4, 0); legL.castShadow=true;
            const legR = new THREE.Mesh(limb, mPants); legR.position.set(0.15, 0.4, 0); legR.castShadow=true;

            group.add(head, torso, armL, armR, legL, legR);
            group.scale.set(scale, scale, scale); group.rotation.y = Math.random() * Math.PI * 2;
            return group;
        }

        function createAnimal(type) {
            const group = new THREE.Group();
            const color = type === 'dog' ? 0xe17055 : 0x8B5A2B;
            const mat = new THREE.MeshLambertMaterial({color: color});
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.8, 8), mat); body.rotation.x = Math.PI/2; body.position.y = 0.6; body.castShadow=true;
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), mat); head.position.set(0, 0.9, -0.4); head.castShadow=true;
            for(let i=0; i<4; i++) {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.4, 8), mat);
                leg.position.set(i<2?-0.15:0.15, 0.25, i%2==0?-0.3:0.3); leg.castShadow=true; group.add(leg);
            }
            group.add(body, head);
            if(type==='dog') group.scale.set(0.6, 0.6, 0.6);
            group.rotation.y = Math.PI/2 + (Math.random()-0.5);
            return group;
        }

        function createWall() {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 2), new THREE.MeshLambertMaterial({color: 0x636e72}));
            mesh.position.y = 2; mesh.castShadow = true; return mesh;
        }

        function createObstacleEntity(type) {
            if(type === 'empty') return new THREE.Group();
            if(type === 'animal' || type === 'dog') return createAnimal(type);
            if(type === 'wall') return createWall();
            if(type === 'box') {
                const b = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshLambertMaterial({color:0xa29bfe})); b.position.y=1; b.castShadow=true;
                const q = new THREE.Mesh(new THREE.PlaneGeometry(1,1), new THREE.MeshBasicMaterial({color:0xffffff})); q.position.set(0,1,1.01); b.add(q); return b;
            }
            if(type === 'crowd') {
                const cg = new THREE.Group();
                for(let i=0; i<10; i++) { const h = createCharacter('human'); h.position.set((Math.random()-0.5)*3, 0, (Math.random()-0.5)*3); cg.add(h); }
                return cg;
            }
            return createCharacter(type);
        }

        // --- ゲームロジック ---
        let gameState = "START"; 
        let cameraZ = 0;
        const BASE_SPEED = 28; // ★ 等速のまま維持 
        
        let targetX = LANE_POSITIONS[0]; 
        let questionStartTime = 0;
        const QUESTION_DURATION = 15; 
        let currentObstacleZ = 0;
        let choiceMade = false;
        let hitTargetType = 'empty';
        
        let activeObstacles = [];

        const uiDilemma = document.getElementById('dilemma-ui');
        const timerBar = document.getElementById('timer-bar');
        const speedo = document.getElementById('speedometer');
        const scenarioCounter = document.getElementById('scenario-counter');

        const btnSwitch = document.getElementById('btn-switch');
        const btnStraight = document.getElementById('btn-straight');

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('start-prompt').style.display = 'flex';
            }, 500);
        });

        document.getElementById('start-prompt').addEventListener('click', () => {
            document.getElementById('start-prompt').style.display = 'none';
            if(!audioSys) audioSys = new AudioSystem();
            audioSys.resume();
            document.getElementById('fade-overlay').style.opacity = '0';
            updateEnvironment(0);
            startCruising(2000); 
        });

        function startCruising(delay = 5000) {
            gameState = "CRUISING";
            targetX = LANE_POSITIONS[currentLaneIndex]; 

            if (currentScenarioIndex < scenarios.length) {
                scenarioCounter.innerText = `${currentScenarioIndex + 1}/10`;
                setTimeout(() => { if(gameState === "CRUISING") setupDilemma(); }, delay); // 5秒のインターバル
            } else {
                endGame();
            }
        }

        function setupDilemma() {
            gameState = "QUESTION";
            choiceMade = false;
            questionStartTime = performance.now();
            
            btnStraight.className = "choice-btn";
            btnSwitch.className = "choice-btn";
            
            const scenario = scenarios[currentScenarioIndex];
            
            // 15秒間猶予 ＋ 2秒バッファ ＝ 計17秒先の距離に配置
            const totalTimeToHit = QUESTION_DURATION + 2; 
            currentObstacleZ = cameraZ - (BASE_SPEED * totalTimeToHit);
            
            const straightX = LANE_POSITIONS[currentLaneIndex];
            const switchX = LANE_POSITIONS[1 - currentLaneIndex];

            let groupStraight = new THREE.Group();
            for(let i=0; i<Math.min(scenario.straightCount, 8); i++) {
                let obs = createObstacleEntity(scenario.straightType); obs.position.set((Math.random()-0.5)*2, 0, (Math.random()-0.5)*2); groupStraight.add(obs);
            }
            groupStraight.position.set(straightX, 0, currentObstacleZ);
            scene.add(groupStraight); activeObstacles.push(groupStraight);

            let groupSwitch = new THREE.Group();
            for(let i=0; i<Math.min(scenario.switchCount, 8); i++) {
                let obs = createObstacleEntity(scenario.switchType); obs.position.set((Math.random()-0.5)*2, 0, (Math.random()-0.5)*2); groupSwitch.add(obs);
            }
            groupSwitch.position.set(switchX, 0, currentObstacleZ);
            scene.add(groupSwitch); activeObstacles.push(groupSwitch);

            document.getElementById('desc-straight-text').innerText = scenario.straightText;
            document.getElementById('desc-switch-text').innerText = scenario.switchText;
            
            uiDilemma.style.display = 'block';
        }

        function executeChoice(action) {
            if (choiceMade || gameState !== "QUESTION") return;
            choiceMade = true;
            
            if (action === 'straight') {
                btnStraight.classList.add('selected');
                btnSwitch.classList.add('disabled');
            } else {
                btnSwitch.classList.add('selected');
                btnStraight.classList.add('disabled');
            }

            setTimeout(() => { uiDilemma.style.display = 'none'; }, 500);
            
            const scenario = scenarios[currentScenarioIndex];
            hitTargetType = action === 'straight' ? scenario.straightType : scenario.switchType;

            // ★決断にかかった時間を記録
            const timeTaken = ((performance.now() - questionStartTime) / 1000).toFixed(2);

            userChoices.push({
                stage: currentScenarioIndex + 1,
                action: action,
                sacrificed: action === 'straight' ? scenario.straightText : scenario.switchText,
                time: timeTaken
            });

            if (action === 'switch') {
                currentLaneIndex = 1 - currentLaneIndex;
                targetX = LANE_POSITIONS[currentLaneIndex];
                if(audioSys) audioSys.playSwitch();
            }
            // ★ 早送りロジックを完全に削除し、BASE_SPEEDのまま維持する

            gameState = "RESOLVING";
        }

        btnSwitch.addEventListener('click', () => executeChoice('switch'));
        btnStraight.addEventListener('click', () => executeChoice('straight'));
        window.addEventListener('keydown', (e) => {
            if (gameState === "QUESTION" && !choiceMade) {
                if (e.key === 'ArrowLeft') executeChoice('switch');
                if (e.key === 'ArrowRight') executeChoice('straight');
            }
        });

        function handleCrash() {
            const hitNothing = (hitTargetType === 'empty');
            
            if (!hitNothing) {
                if(audioSys) audioSys.playCrash();
                document.getElementById('flash-overlay').style.opacity = '1';
                
                const hitWall = (currentScenarioIndex === scenarios.length - 1 && hitTargetType === 'wall');
                if (hitWall) document.getElementById('flash-overlay').style.background = '#d63031';

                setTimeout(() => { document.getElementById('flash-overlay').style.opacity = '0'; }, 150);
                
                let shake = 20;
                const shakeInt = setInterval(() => {
                    camera.position.y = 3 + (Math.random()-0.5)*0.5;
                    camera.position.x = targetX + (Math.random()-0.5)*0.3;
                    if(--shake < 0) { clearInterval(shakeInt); camera.position.y = 3; camera.position.x = targetX; }
                }, 30);
            }

            const hitWall = (currentScenarioIndex === scenarios.length - 1 && hitTargetType === 'wall');
            currentScenarioIndex++;

            setTimeout(() => {
                activeObstacles.forEach(obs => scene.remove(obs)); activeObstacles = [];
            }, 500);

            if (hitWall || currentScenarioIndex >= scenarios.length) {
                setTimeout(() => { endGame(); }, 800);
            } else {
                // 次の問題まで5秒のインターバル
                startCruising(5000); 
            }
        }

        function endGame() {
            gameState = "END";
            if(audioSys) audioSys.updateSpeed(0);
            document.getElementById('fade-overlay').style.opacity = '1';
            
            setTimeout(() => {
                const endScreen = document.getElementById('end-screen');
                endScreen.style.display = 'flex';
                
                const tbody = document.getElementById('results-tbody');
                const jsonArr = [];
                
                userChoices.forEach(c => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>区間 ${c.stage}</td>
                        <td>${c.action === 'straight' ? '<span class="tag-inaction">そのまま直進</span>' : '<span class="tag-action">進路を切り替える</span>'}</td>
                        <td style="font-weight:900;">${c.sacrificed}</td>
                        <td>${c.time}秒</td>`;
                    tbody.appendChild(tr);
                    jsonArr.push({stage: c.stage, action: c.action, hit: c.sacrificed, decision_time_sec: parseFloat(c.time)});
                });
                
                document.getElementById('json-output').value = JSON.stringify(jsonArr, null, 2);
            }, 1000);
        }

        // --- メインループ ---
        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now();
            const delta = (now - lastTime) / 1000;
            lastTime = now;

            if (gameState !== "START" && gameState !== "END") {
                // ★ 常に一定のスピード(BASE_SPEED)で走る
                const currentSpeed = BASE_SPEED;
                
                cameraZ -= currentSpeed * delta;
                camera.position.z = cameraZ;
                
                const diffX = targetX - camera.position.x;
                camera.position.x += diffX * 5 * delta;
                camera.rotation.z = -diffX * 0.03; 

                trackGroup.position.z = cameraZ - (cameraZ % 500);
                updateEnvironment(cameraZ); 
                
                speedo.innerText = Math.floor(currentSpeed * 3.6);
                if(audioSys) {
                    audioSys.updateSpeed(1.0); // オーディオのピッチも常に一定
                }

                if (gameState === "QUESTION") {
                    const elapsed = (now - questionStartTime) / 1000;
                    const remain = Math.max(0, QUESTION_DURATION - elapsed);
                    
                    timerBar.style.transform = `scaleX(${remain / QUESTION_DURATION})`;
                    if (remain < 3) timerBar.style.background = '#d63031'; 
                    else timerBar.style.background = '#fdcb6e';

                    if (elapsed >= QUESTION_DURATION && !choiceMade) {
                        executeChoice('straight'); 
                    }
                }
                
                if (gameState === "QUESTION" || gameState === "RESOLVING") {
                    if (cameraZ <= currentObstacleZ) {
                        cameraZ = currentObstacleZ;
                        gameState = "CRASHED"; 
                        handleCrash();
                    }
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
