<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>実験哲学プラットフォーム</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <style>
    body { font-family: sans-serif; padding: 20px; background:#f5f5f5 }
    .card { background:white; padding:20px; border-radius:10px; margin-bottom:15px; cursor:pointer }
    .btn { padding:10px 16px; background:#333; color:white; border:none; cursor:pointer }
  </style>
</head>
<body>
<div id="root"></div>

<script>
const { useState, useEffect } = React;
const e = React.createElement;

const API_URL = "https://tetsugaku-platform.onrender.com/api";

function Home({ goList }) {
  return e('div', null,
    e('h2', null, '実験哲学プラットフォーム'),
    e('button', { className:'btn', onClick: goList }, '実験に参加する')
  );
}

function SurveyList({ goBack, goPlay }) {
  const [list, setList] = useState([]);

  useEffect(() => {
    fetch(API_URL + '/surveys/')
      .then(r => r.json())
      .then(setList);
  }, []);

  return e('div', null,
    e('button', { onClick: goBack }, '←戻る'),
    e('h3', null, '実験一覧'),

    list.map(s =>
      e('div', {
        key: s.id,
        className: 'card',
        onClick: () => goPlay(s)
      },
        e('div', null, s.title),
        e('div', null, s.description)
      )
    )
  );
}

function Player({ survey, goBack }) {
  const [questions, setQuestions] = useState([]);
  const [idx, setIdx] = useState(0);

  useEffect(() => {
    fetch(API_URL + '/surveys/' + survey.id + '/')
      .then(r => r.json())
      .then(data => {

        let raw = [];

        if (Array.isArray(data.categories)) {
          data.categories.forEach(c => {
            if (Array.isArray(c.questions)) {
              raw = raw.concat(c.questions);
            }
          });
        }

        setQuestions(raw);
      });

  }, []);

  if (questions.length === 0) {
    return e('div', null, 'loading...');
  }

  const q = questions[idx];

  return e('div', null,
    e('button', { onClick: goBack }, '←一覧へ'),

    e('h3', null, survey.title),

    e('p', null, q.text),

    q.choices.map(c =>
      e('div', {
        key: c.id,
        className: 'card',
        onClick: () => {

          fetch(API_URL + '/answers/', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
              question: q.id,
              choice: c.id
            })
          });

          if (idx < questions.length - 1) {
            setIdx(idx + 1);
          } else {
            alert('完了');
          }

        }
      }, c.text)
    )
  );
}

function App() {
  const [page, setPage] = useState('home');
  const [survey, setSurvey] = useState(null);

  if (page === 'list') {
    return e(SurveyList, {
      goBack: () => setPage('home'),
      goPlay: (s) => { setSurvey(s); setPage('play'); }
    });
  }

  if (page === 'play') {
    return e(Player, {
      survey,
      goBack: () => setPage('list')
    });
  }

  return e(Home, {
    goList: () => setPage('list')
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>

</body>
</html>
