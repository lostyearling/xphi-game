<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>実験哲学ゲームプラットフォーム</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
  --bg:             #f5f4f0;
  --surface:        #ffffff;
  --surface2:       #f0eeea;
  --border:         rgba(0,0,0,0.08);
  --border2:        rgba(0,0,0,0.14);
  --text:           #1a1a1b;
  --muted:          #8a8880;
  --accent:         #9a7a3e;
  --accent-bg:      rgba(154,122,62,0.10);
  --accent-border:  rgba(154,122,62,0.30);
  --info:           #3a6fb4;
  --info-bg:        rgba(58,111,180,0.10);
  --info-border:    rgba(58,111,180,0.30);
  --success:        #3a8d67;
  --danger:         #c46b6b;
  --radius:         10px;
  --radius-lg:      16px;
}

:root.dark {
  --bg:             #0e0e0f;
  --surface:        #17171a;
  --surface2:       #1f1f24;
  --border:         rgba(255,255,255,0.08);
  --border2:        rgba(255,255,255,0.14);
  --text:           #f0ede8;
  --muted:          #7a7870;
  --accent:         #c8a96e;
  --accent-bg:      rgba(200,169,110,0.10);
  --accent-border:  rgba(200,169,110,0.30);
  --info:           #5b8fd4;
  --info-bg:        rgba(91,143,212,0.10);
  --info-border:    rgba(91,143,212,0.30);
  --success:        #5aad87;
  --danger:         #c46b6b;
  --radius:         10px;
  --radius-lg:      16px;
}

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .topbar {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.03em;
    }
    .topbar-back {
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      transition: color 0.15s;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .topbar-back:hover { color: var(--text); }
    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── HOME ── */
    .home-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }
    .home-logo {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-bottom: 2rem;
    }
    .home-title {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 600;
      color: var(--text);
      text-align: center;
      line-height: 1.7;
      margin-bottom: 1rem;
    }
    .home-sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      max-width: 420px;
      line-height: 1.8;
      margin-bottom: 3rem;
    }
    .home-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 560px;
    }
    @media (max-width: 480px) { .home-cards { grid-template-columns: 1fr; } }

    .entry-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      text-align: left;
    }
    .entry-card:hover { background: var(--surface2); transform: translateY(-2px); }
    .entry-card.player:hover       { border-color: var(--accent-border); }
    .entry-card.experimenter:hover { border-color: var(--info-border); }

    .entry-icon  { font-size: 28px; margin-bottom: 14px; display: block; }
    .entry-role  {
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 8px; display: block;
    }
    .entry-role.player       { color: var(--accent); }
    .entry-role.experimenter { color: var(--info); }
    .entry-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 15px; font-weight: 600;
      color: var(--text); margin-bottom: 8px; line-height: 1.5;
    }
    .entry-desc  { font-size: 12px; color: var(--muted); line-height: 1.7; }
    .entry-arrow {
      display: block; margin-top: 18px;
      font-size: 18px; color: var(--muted); transition: color 0.15s;
    }
    .entry-card:hover .entry-arrow { color: var(--text); }
    .home-footer {
      margin-top: 3rem;
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--muted); letter-spacing: 0.05em;
    }

    /* ── PAGE SHELL ── */
    .page-wrap {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }
    .page-inner { width: 100%; max-width: 600px; }
    .page-footer {
      text-align: center; margin-top: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--muted); letter-spacing: 0.05em;
    }

    /* ── GAME ── */
    .body { padding: 28px 24px; }

    .progress-wrap {
      height: 2px; background: var(--border);
      margin-bottom: 28px; border-radius: 2px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; background: var(--accent);
      border-radius: 2px; transition: width 0.4s ease;
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 12px; display: block;
    }
    .label.accent { color: var(--accent); }

    .q-jp {
      font-family: 'Noto Serif JP', serif;
      font-size: 15px; line-height: 1.8;
      color: var(--text); margin-bottom: 24px;
    }

    .opt-btn {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; padding: 13px 16px; margin-bottom: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer; text-align: left;
      transition: border-color 0.15s, background 0.15s; color: var(--text);
    }
    .opt-btn:hover { border-color: var(--border2); background: rgba(255,255,255,0.04); }
    .opt-btn.selected { background: var(--accent-bg); border-color: var(--accent-border); }
    .opt-btn.selected .opt-jp { color: var(--accent); }

    .opt-jp    { font-size: 14px; font-weight: 500; color: var(--text); }
    .opt-arrow { font-size: 16px; color: var(--muted); flex-shrink: 0; }

    .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
    .opt-grid .opt-btn { margin-bottom: 0; }

    .recall {
      background: var(--surface2); border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius); padding: 10px 14px; margin-bottom: 24px;
    }
    .recall-label {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 4px;
    }
    .recall-val { font-size: 14px; font-weight: 500; color: var(--text); }

    .slider-wrap {
      margin-top: 20px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 18px;
    }
    .slider-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .slider-label { font-size: 13px; color: var(--muted); }
    .slider-val {
      font-family: 'DM Mono', monospace; font-size: 26px;
      font-weight: 500; color: var(--accent); line-height: 1;
    }
    .slider-weight {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--muted); text-align: right; margin-top: 3px;
    }
    input[type=range] {
      width: 100%; height: 4px; appearance: none;
      background: var(--border2); border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      appearance: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .slider-hints {
      display: flex; justify-content: space-between;
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: var(--muted); margin-top: 8px;
    }

    .btn-primary {
      display: block; width: 100%; padding: 14px; margin-top: 18px;
      background: var(--accent); border: none; border-radius: var(--radius);
      color: #0e0e0f; font-size: 14px; font-weight: 500;
      cursor: pointer; letter-spacing: 0.02em; transition: opacity 0.15s;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .btn-primary:hover    { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.38; cursor: not-allowed; }

    .btn-ghost {
      display: block; width: 100%; padding: 13px; margin-top: 10px;
      background: transparent; border: 1px solid var(--border2);
      border-radius: var(--radius); color: var(--muted); font-size: 13px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .btn-ghost:hover { color: var(--text); }

    /* Result */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stat-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; text-align: center;
    }
    .stat-label {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .stat-val { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: var(--text); }
    .score-card {
      grid-column: 1 / -1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .score-label {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    .score-val { font-family: 'DM Mono', monospace; font-size: 34px; font-weight: 500; }
    .title-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px; text-align: center; margin: 12px 0 14px;
    }
    .title-label {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }
    .title-jp { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .title-en { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

    /* ── EXPERIMENTER ── */
    .exp-section { margin-bottom: 32px; }
    .exp-section-title {
      font-family: 'Noto Serif JP', serif; font-size: 15px; font-weight: 600;
      color: var(--text); margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .form-group { margin-bottom: 14px; }
    .form-label {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); display: block; margin-bottom: 6px;
    }
    .form-input, .form-textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif; padding: 10px 14px;
      outline: none; transition: border-color 0.15s;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--accent-border); }
    .form-textarea { resize: vertical; min-height: 72px; line-height: 1.6; }

    .q-block {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px;
    }
    .q-block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .q-block-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.1em; }
    .q-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; transition: color 0.15s; }
    .q-remove:hover { color: var(--danger); }

    .opt-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .opt-row .form-input { flex: 1; }
    .opt-correct {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .opt-correct.active { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent); }
    .opt-remove-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 18px; flex-shrink: 0; transition: color 0.15s;
    }
    .opt-remove-btn:hover { color: var(--danger); }
    .opt-add {
      background: none; border: 1px dashed var(--border2); border-radius: var(--radius);
      color: var(--muted); font-size: 13px; cursor: pointer;
      padding: 8px 14px; width: 100%; margin-top: 4px;
      transition: border-color 0.15s, color 0.15s;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .opt-add:hover { border-color: var(--accent-border); color: var(--accent); }

    .btn-add-q {
      display: block; width: 100%; padding: 12px; background: none;
      border: 1px dashed var(--border2); border-radius: var(--radius-lg);
      color: var(--muted); font-size: 13px; cursor: pointer; margin-bottom: 24px;
      transition: border-color 0.15s, color 0.15s;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .btn-add-q:hover { border-color: var(--accent-border); color: var(--accent); }

    .info-note {
      background: var(--info-bg); border: 1px solid var(--info-border);
      border-radius: var(--radius); padding: 12px 16px;
      font-size: 12px; color: var(--info); margin-bottom: 20px; line-height: 1.7;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate { animation: fadeUp 0.3s ease forwards; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect } = React;
function ThemeToggle() {
  const [dark, setDark] = useState(false);
  const toggle = () => {
    setDark(!dark);
    document.documentElement.classList.toggle('dark');
  };
  return e('button', {
    onClick: toggle,
    style: {
      position: 'fixed', top: '12px', right: '12px', zIndex: 1000,
      background: 'var(--surface2)', border: '1px solid var(--border2)',
      color: 'var(--text)', borderRadius: '20px', padding: '6px 14px',
      fontSize: '12px', cursor: 'pointer', fontFamily: "'DM Mono', monospace"
    }
  }, dark ? '☀️ Light' : '🌙 Dark');
}
const API_URL = 'https://tetsugaku-platform.onrender.com/api';
const e = React.createElement;

// ── Default demo questions ──────────────────────────────────────────────────
const defaultQuestions = [
  {
    id: 1,
    type1: {
      q: '2026年より施行された「税金や社会保険料を滞納した外国人の永住権を取り消す」新制度について、あなたはどう思いますか？',
      options: ['賛成', '中立', '反対'],
      majorityIndex: 0,
      type: 'majority'
    },
    type2: { q: 'あなたの回答は「多数派（1位）」だと思いますか？', options: ['多数派', '少数派'] }
  },
  {
    id: 2,
    type1: {
      q: '政府が「特定技能ビザ」の対象分野をほぼ全ての産業に拡大したことについて、どう思いますか？',
      options: ['賛成', '中立', '反対'],
      percentBuckets: [1, 3, 0],
      type: 'percent'
    },
    type2: { q: 'あなたと「同じ回答」を選んだ人は何割くらいいると思いますか？', options: ['80%以上', '50%~79%', '20%~49%', '20%未満'] }
  },
  {
    id: 3,
    type1: {
      q: '永住権を持つ外国人に対し、地方選挙での「投票権」を認めるべきだと思いますか？',
      options: ['強く賛成', '賛成', '反対', '強く反対'],
      ranks: [2, 1, 0, 3],
      type: 'rank'
    },
    type2: { q: '一般大衆の間で「最も多く選ばれた」回答はどれだと思いますか？', options: ['強く賛成', '賛成', '反対', '強く反対'] }
  },
  {
    id: 4,
    type1: {
      q: '全ての就労・配偶者ビザの更新時に、基礎的な「日本語能力テスト」の合格を義務付ける政策を支持しますか？',
      options: ['支持する', '支持しない', 'わからない'],
      majorityIndex: 0,
      type: 'majority'
    },
    type2: { q: 'あなたの回答は「多数派（1位）」ですか？', options: ['多数派', '少数派'] }
  },
  {
    id: 5,
    type1: {
      q: '公権力の行使を伴わない地方公務員における、外国籍住民の採用制限撤廃についてどう思いますか？',
      options: ['賛成', '反対', 'わからない'],
      over50Index: 0,
      type: 'over50'
    },
    type2: { q: 'この政策に「賛成」している人は日本社会で過半数だと思いますか？', options: ['過半数だと思う', '過半数ではない'] }
  }
];

// ── Scoring ─────────────────────────────────────────────────────────────────
function scoreAnswer(q, t1Idx, t2Idx, confidence) {
  const weight = Math.floor(confidence / 10) + 1;
  let score = 0, correct = false, aligned = false;

  if (q.type1.type === 'majority') {
    aligned = t1Idx === q.type1.majorityIndex;
    correct = t2Idx === (aligned ? 0 : 1);
    score   = correct ? 10 * weight : -(10 * weight);
  } else if (q.type1.type === 'percent') {
    correct = t2Idx === q.type1.percentBuckets[t1Idx];
    score   = correct ? 10 * weight : -(10 * weight);
  } else if (q.type1.type === 'rank') {
    const R = q.type1.ranks[t2Idx];
    const N = q.type2.options.length;
    score   = Math.round(10 * weight - (R / (N - 1)) * 20 * weight);
    correct = R === 0;
    aligned = q.type1.ranks[t1Idx] === 0;
  } else if (q.type1.type === 'over50') {
    correct = t2Idx === 0;
    score   = correct ? 10 * weight : -(10 * weight);
  }
  return { score, correct, aligned };
}

const getTitleData = (s) => {
  if (s < 0)    return { jp: '迷える羊',         en: 'Lost Sheep',                  color: '#7a7870' };
  if (s <= 150) return { jp: '一般市民',         en: 'Ordinary Citizen',            color: '#5b8fd4' };
  if (s <= 300) return { jp: '世論の観察者',     en: 'Observer of Public Opinion',  color: '#5aad87' };
  if (s <= 450) return { jp: 'トレンドリーダー', en: 'Trend Leader',                color: '#9b85d4' };
  return          { jp: '集合知の預言者',         en: 'Prophet of Collective Wisdom', color: '#c8a96e' };
};

// ══════════════════════════════════════════════════════════════════════════════
// GAME PAGE
// ══════════════════════════════════════════════════════════════════════════════
function GamePage({ questions, onBack }) {
  const [step, setStep]             = useState('start');
  const [qIndex, setQIndex]         = useState(0);
  const [history, setHistory]       = useState([]);
  const [t1Idx, setT1Idx]           = useState(null);
  const [t2Idx, setT2Idx]           = useState(null);
  const [confidence, setConfidence] = useState(50);

  const currentQ = questions[qIndex];
  const weight   = Math.floor(confidence / 10) + 1;
  const total    = history.reduce((a, h) => a + h.score, 0);
  const accuracy = history.length ? Math.round(history.filter(h => h.correct).length / history.length * 100) : 0;
  const alignRate= history.length ? Math.round(history.filter(h => h.aligned).length / history.length * 100) : 0;

  const submitAnswer = (questionId, choiceId, predictedMajority) => {
  fetch(`${API_URL}/answers/`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      question: questionId,
      choice: choiceId,
      predicted_majority: predictedMajority
    })
  }).catch(err => console.error('Answer submit error:', err));
};
  const handleStart = () => {
    setStep('type1'); setQIndex(0); setHistory([]);
    setT1Idx(null); setT2Idx(null); setConfidence(50);
  };
  const handleT1 = (idx) => { setT1Idx(idx); setStep('type23'); setT2Idx(null); setConfidence(50); };
const handleBet = () => {
  const result = scoreAnswer(currentQ, t1Idx, t2Idx, confidence);
  const newHistory = [...history, result];
  setHistory(newHistory);
  submitAnswer(questions[qIndex].id, t1Idx, t2Idx !== null);
  if (qIndex < questions.length - 1) { setQIndex(qIndex + 1); setStep('type1'); setT1Idx(null); }
  else setStep('result');
};

  const progress  = (qIndex + (step === 'result' ? 1 : 0)) / questions.length * 100;
  const titleData = getTitleData(total);

  const header = e('div', { className: 'topbar' },
    e('button', { className: 'topbar-back', onClick: onBack }, '← トップへ戻る'),
    e('div', { className: 'topbar-title' }, '世論の鏡'),
    (step !== 'start' && step !== 'result')
      ? e('span', { className: 'badge' }, `Q ${qIndex + 1} / ${questions.length}`)
      : e('span', null)
  );

  const startScreen = e('div', { className: 'body animate', style: { textAlign: 'center', padding: '44px 24px' } },
    e('span', { style: { fontSize: 36, display: 'block', marginBottom: 20 } }, '🪞'),
    e('h2', { style: { fontFamily: "'Noto Serif JP',serif", fontSize: 18, fontWeight: 600, color: 'var(--text)', marginBottom: 12, lineHeight: 1.7 } },
      'あなたは社会の「多数派」を', e('br'), 'どこまで予測できますか？'
    ),
    e('p', { style: { fontSize: 12, color: 'var(--muted)', lineHeight: 1.8, maxWidth: 360, margin: '0 auto 28px' } },
      '各設問に対するあなたの意見を選択した後、世論の多数派を予測してください。自信度を賭けることでスコアが変動します。'
    ),
    e('button', { className: 'btn-primary', onClick: handleStart }, 'ゲームを開始する →')
  );

  const type1Screen = e('div', { className: 'body animate', key: `t1-${qIndex}` },
    e('div', { className: 'progress-wrap' }, e('div', { className: 'progress-bar', style: { width: `${progress}%` } })),
    e('span', { className: 'label accent' }, 'ステップ 1 — あなたの意見'),
    e('p', { className: 'q-jp' }, currentQ.type1.q),
    currentQ.type1.options.map((opt, i) =>
      e('button', { key: i, className: 'opt-btn', onClick: () => handleT1(i) },
        e('span', { className: 'opt-jp' }, opt),
        e('span', { className: 'opt-arrow' }, '›')
      )
    )
  );

  const recallOpt   = currentQ && currentQ.type1.options[t1Idx];
  const type23Screen = e('div', { className: 'body animate', key: `t23-${qIndex}` },
    e('div', { className: 'progress-wrap' }, e('div', { className: 'progress-bar', style: { width: `${progress + (1 / questions.length) * 50}%` } })),
    e('div', { className: 'recall' },
      e('div', { className: 'recall-label' }, 'あなたの回答'),
      e('div', { className: 'recall-val' }, recallOpt || '')
    ),
    e('span', { className: 'label accent' }, 'ステップ 2 — 世論の予測'),
    e('p', { className: 'q-jp' }, currentQ.type2.q),
    e('div', { className: 'opt-grid' },
      currentQ.type2.options.map((opt, i) =>
        e('button', { key: i, className: `opt-btn${t2Idx === i ? ' selected' : ''}`, onClick: () => setT2Idx(i) },
          e('span', { className: 'opt-jp' }, opt)
        )
      )
    ),
    t2Idx !== null && e('div', { className: 'slider-wrap' },
      e('div', { className: 'slider-row' },
        e('div', null,
          e('div', { style: { fontSize: 14, fontWeight: 500, color: 'var(--text)', marginBottom: 3 } }, '自信度'),
          e('div', { className: 'slider-label' }, '自信が高いほどリスクと報酬が増加します')
        ),
        e('div', { style: { textAlign: 'right' } },
          e('div', { className: 'slider-val' }, `${confidence}%`),
          e('div', { className: 'slider-weight' }, `重み ×${weight}`)
        )
      ),
      e('input', { type: 'range', min: 0, max: 100, step: 5, value: confidence, onChange: ev => setConfidence(parseInt(ev.target.value)) }),
      e('div', { className: 'slider-hints' },
        e('span', null, '0% — 低リスク'),
        e('span', null, '100% — 高リスク')
      ),
      e('button', { className: 'btn-primary', onClick: handleBet }, '賭ける →')
    )
  );

  const resultScreen = e('div', { className: 'body animate' },
    e('div', { className: 'progress-wrap' }, e('div', { className: 'progress-bar', style: { width: '100%' } })),
    e('p', { style: { fontFamily: "'Noto Serif JP',serif", fontSize: 17, fontWeight: 600, color: 'var(--text)', textAlign: 'center', marginBottom: 4 } }, 'あなたの社会レーダー'),
    e('p', { style: { fontSize: 12, color: 'var(--muted)', textAlign: 'center', marginBottom: 28 } }, 'Your Social Radar Results'),
    e('div', { className: 'stat-grid' },
      e('div', { className: 'stat-card' }, e('div', { className: 'stat-label' }, '予測正確率'), e('div', { className: 'stat-val' }, `${accuracy}%`)),
      e('div', { className: 'stat-card' }, e('div', { className: 'stat-label' }, '多数派一致率'), e('div', { className: 'stat-val' }, `${alignRate}%`)),
      e('div', { className: 'score-card' },
        e('div', null,
          e('div', { className: 'score-label' }, '獲得スコア'),
          e('div', { className: 'score-val', style: { color: total >= 0 ? 'var(--success)' : 'var(--danger)' } }, `${total > 0 ? '+' : ''}${total} pts`)
        ),
        e('span', { style: { fontSize: 30 } }, '🏆')
      )
    ),
    e('div', { className: 'title-card' },
      e('div', { className: 'title-label' }, '最終称号'),
      e('div', { className: 'title-jp', style: { color: titleData.color } }, titleData.jp),
      e('div', { className: 'title-en' }, titleData.en)
    ),
    e('button', { className: 'btn-ghost', onClick: handleStart }, 'もう一度プレイする')
  );

  return e('div', { className: 'page-wrap' },
    e('div', { className: 'page-inner' },
      e('div', { className: 'card' },
        header,
        step === 'start'  && startScreen,
        step === 'type1'  && type1Screen,
        step === 'type23' && type23Screen,
        step === 'result' && resultScreen
      ),
      e('p', { className: 'page-footer' }, 'データはデモンストレーション用のシミュレーションです。')
    )
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// EXPERIMENTER PAGE
// ══════════════════════════════════════════════════════════════════════════════
const blankQ = () => ({
  id: Date.now() + Math.random(),
  t1q: '', options: ['', ''], majorityIndex: 0,
  t2q: 'あなたの回答は「多数派（1位）」だと思いますか？'
});

function ExperimenterPage({ onPublish, onBack }) {
  const [title, setTitle]       = useState('');
  const [desc, setDesc]         = useState('');
  const [questions, setQs]      = useState([blankQ()]);
  const [submitted, setSubmitted] = useState(false);

  const addQ    = () => setQs(qs => [...qs, blankQ()]);
  const removeQ = (id) => setQs(qs => qs.filter(q => q.id !== id));

  const updateQ = (id, key, val) =>
    setQs(qs => qs.map(q => q.id !== id ? q : { ...q, [key]: val }));

  const updateOpt = (id, idx, val) =>
    setQs(qs => qs.map(q => {
      if (q.id !== id) return q;
      const opts = [...q.options]; opts[idx] = val;
      return { ...q, options: opts };
    }));

  const addOpt = (id) =>
    setQs(qs => qs.map(q => q.id !== id ? q : { ...q, options: [...q.options, ''] }));

  const removeOpt = (id, idx) =>
    setQs(qs => qs.map(q => {
      if (q.id !== id || q.options.length <= 2) return q;
      const opts = q.options.filter((_, i) => i !== idx);
      return { ...q, options: opts, majorityIndex: Math.min(q.majorityIndex, opts.length - 1) };
    }));

  const handleSubmit = () => {
    const built = questions.map((q, i) => ({
      id: i + 1,
      type1: { q: q.t1q, options: q.options, majorityIndex: q.majorityIndex, type: 'majority' },
      type2: { q: q.t2q, options: ['多数派', '少数派'] }
    }));
    onPublish(built, title);
    setSubmitted(true);
  };

  const isValid = title.trim() &&
    questions.every(q => q.t1q.trim() && q.options.filter(o => o.trim()).length >= 2 && q.t2q.trim());

  if (submitted) {
    return e('div', { className: 'page-wrap' },
      e('div', { className: 'page-inner' },
        e('div', { className: 'card' },
          e('div', { className: 'topbar' },
            e('button', { className: 'topbar-back', onClick: onBack }, '← トップへ戻る'),
            e('div', { className: 'topbar-title' }, '実験者ページ'),
            e('span', null)
          ),
          e('div', { className: 'body animate', style: { textAlign: 'center', padding: '44px 24px' } },
            e('span', { style: { fontSize: 36, display: 'block', marginBottom: 20 } }, '✅'),
            e('h2', { style: { fontFamily: "'Noto Serif JP',serif", fontSize: 18, fontWeight: 600, color: 'var(--text)', marginBottom: 12 } }, '実験が登録されました'),
            e('p', { style: { fontSize: 13, color: 'var(--muted)', lineHeight: 1.8, maxWidth: 340, margin: '0 auto 28px' } },
              `「${title}」のゲームセッションが作成されました。プレイヤーページからプレイできます。`
            ),
            e('button', { className: 'btn-primary', onClick: onBack }, 'トップへ戻る'),
            e('button', { className: 'btn-ghost', onClick: () => { setSubmitted(false); setTitle(''); setDesc(''); setQs([blankQ()]); } }, '別の実験を作成する')
          )
        )
      )
    );
  }

  return e('div', { className: 'page-wrap' },
    e('div', { className: 'page-inner' },
      e('div', { className: 'card' },
        e('div', { className: 'topbar' },
          e('button', { className: 'topbar-back', onClick: onBack }, '← トップへ戻る'),
          e('div', { className: 'topbar-title' }, '実験者ページ'),
          e('span', null)
        ),
        e('div', { className: 'body' },
          e('div', { className: 'info-note' },
            'ℹ️ 作成された実験はブラウザセッション内で有効です。ページを閉じるとリセットされます。'
          ),

          // Basic info
          e('div', { className: 'exp-section' },
            e('div', { className: 'exp-section-title' }, '実験の基本情報'),
            e('div', { className: 'form-group' },
              e('label', { className: 'form-label' }, '実験タイトル'),
              e('input', { className: 'form-input', type: 'text', placeholder: '例：移民政策に対する世論認識調査', value: title, onChange: ev => setTitle(ev.target.value) })
            ),
            e('div', { className: 'form-group' },
              e('label', { className: 'form-label' }, '説明（任意）'),
              e('textarea', { className: 'form-textarea', placeholder: 'この実験の目的や概要を入力してください。', value: desc, onChange: ev => setDesc(ev.target.value) })
            )
          ),

          // Questions
          e('div', { className: 'exp-section' },
            e('div', { className: 'exp-section-title' }, `設問（${questions.length}問）`),
            questions.map((q, qi) =>
              e('div', { key: q.id, className: 'q-block animate' },
                e('div', { className: 'q-block-header' },
                  e('span', { className: 'q-block-num' }, `Q${qi + 1}`),
                  questions.length > 1 && e('button', { className: 'q-remove', onClick: () => removeQ(q.id) }, '×')
                ),
                e('div', { className: 'form-group' },
                  e('label', { className: 'form-label' }, 'ステップ1 — 設問文'),
                  e('textarea', { className: 'form-textarea', placeholder: '例：この政策についてあなたはどう思いますか？', value: q.t1q, onChange: ev => updateQ(q.id, 't1q', ev.target.value) })
                ),
                e('div', { className: 'form-group' },
                  e('label', { className: 'form-label' }, '選択肢（◎ で多数派をマーク）'),
                  q.options.map((opt, oi) =>
                    e('div', { key: oi, className: 'opt-row' },
                      e('input', { className: 'form-input', type: 'text', placeholder: `選択肢 ${oi + 1}`, value: opt, onChange: ev => updateOpt(q.id, oi, ev.target.value) }),
                      e('button', { className: `opt-correct${q.majorityIndex === oi ? ' active' : ''}`, title: '多数派としてマーク', onClick: () => updateQ(q.id, 'majorityIndex', oi) }, '◎'),
                      q.options.length > 2 && e('button', { className: 'opt-remove-btn', onClick: () => removeOpt(q.id, oi) }, '×')
                    )
                  ),
                  e('button', { className: 'opt-add', onClick: () => addOpt(q.id) }, '＋ 選択肢を追加')
                ),
                e('div', { className: 'form-group' },
                  e('label', { className: 'form-label' }, 'ステップ2 — 世論予測の設問文'),
                  e('input', { className: 'form-input', type: 'text', placeholder: '例：あなたの回答は「多数派（1位）」だと思いますか？', value: q.t2q, onChange: ev => updateQ(q.id, 't2q', ev.target.value) })
                )
              )
            ),
            e('button', { className: 'btn-add-q', onClick: addQ }, '＋ 設問を追加する')
          ),

          e('button', { className: 'btn-primary', disabled: !isValid, onClick: handleSubmit }, '実験を登録してプレイヤーに公開する →')
        )
      ),
      e('p', { className: 'page-footer' }, 'データはブラウザセッション内のみ保存されます。')
    )
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// HOME PAGE
// ══════════════════════════════════════════════════════════════════════════════
function HomePage({ onPlayer, onExperimenter }) {
  return e('div', { className: 'home-wrap animate' },
    e('div', { className: 'home-logo' }, 'TETSUGAKU.ONLINE'),
    e('h1', { className: 'home-title' }, '実験哲学ゲームプラットフォーム'),
    e('p', { className: 'home-sub' },
    '認識論・心の哲学・メタ認知の問いにこたえて、キミのこころをそっとのぞいてみよう。直感にしたがって進むうちに、まだ知らない自分の価値観や思考のクセが見えてくるよ。ちょっと不思議でかわいい、こころの探検ゲームへようこそ！'
    ),
    e('div', { className: 'home-cards' },
      e('div', { className: 'entry-card player', onClick: onPlayer },
        e('span', { className: 'entry-icon' }, '🎮'),
        e('span', { className: 'entry-role player' }, 'Player'),
        e('div', { className: 'entry-title' }, 'プレイヤーとして参加する'),
        e('p', { className: 'entry-desc' }, '哲学者の考えをちょっぴり想像しながら、気軽に楽しくプレイしてみてね！'),
        e('span', { className: 'entry-arrow' }, '→')
      ),
      e('div', { className: 'entry-card experimenter', onClick: onExperimenter },
        e('span', { className: 'entry-icon' }, '🔬'),
        e('span', { className: 'entry-role experimenter' }, 'Experimenter'),
        e('div', { className: 'entry-title' }, '実験者として設計する'),
        e('p', { className: 'entry-desc' }, '新しい実験哲学の設問を作成し、プレイヤーに公開するゲームを設計します。'),
        e('span', { className: 'entry-arrow' }, '→')
      )
    ),
    e('p', { className: 'home-footer' }, '実験哲学ゲームプラットフォーム — Demo Version')
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// ROOT
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [page, setPage] = useState('home');
  const [experiments, setExperiments] = useState([]);
  const [gameQuestions, setGameQ] = useState([]);

  useEffect(() => {
  fetch(`${API_URL}/experiments/`)
    .then(res => res.json())
    .then(data => {
      setExperiments(data);
      if (data.length > 0) {
        const converted = data[0].questions.map(q => ({
          id: q.id,
          type1: {
            q: q.text,
            options: q.choices.map(c => c.text),
            majorityIndex: q.choices.findIndex(c => c.is_majority),
            type: 'majority'
          },
          type2: {
            q: 'あなたの回答は「多数派（1位）」だと思いますか？',
            options: ['多数派', '少数派']
          }
        }));
        setGameQ(converted);
      }
    })
    .catch(err => console.error('API error:', err));
}, []);

  const handlePublish = (questions) => setGameQ(questions);

  if (page === 'player')       return e(GamePage,         { questions: gameQuestions, onBack: () => setPage('home') });
  if (page === 'experimenter') return e(ExperimenterPage, { onPublish: handlePublish, onBack: () => setPage('home') });
  return e(HomePage, { onPlayer: () => setPage('player'), onExperimenter: () => setPage('experimenter'), experiments });
}

ReactDOM.createRoot(document.getElementById('root')).render(
  e(React.Fragment, null, e(ThemeToggle), e(App))
);
</script>
</body>
