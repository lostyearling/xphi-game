<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世論の鏡 | Mirror of Public Opinion</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=DM+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0f;
      --surface:   #17171a;
      --surface2:  #1f1f24;
      --border:    rgba(255,255,255,0.08);
      --border2:   rgba(255,255,255,0.14);
      --text:      #f0ede8;
      --muted:     #7a7870;
      --accent:    #c8a96e;
      --accent-bg: rgba(200,169,110,0.10);
      --accent-border: rgba(200,169,110,0.30);
      --info:      #5b8fd4;
      --info-bg:   rgba(91,143,212,0.10);
      --info-border: rgba(91,143,212,0.30);
      --success:   #5aad87;
      --danger:    #c46b6b;
      --radius:    10px;
      --radius-lg: 16px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 4rem;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    #root {
      width: 100%;
      max-width: 600px;
      position: relative;
      z-index: 1;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface2);
    }
    .header-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .header-title span {
      color: var(--muted);
      font-weight: 400;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      margin-left: 8px;
    }
    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* Body */
    .body { padding: 28px 24px; }

    /* Progress bar */
    .progress-wrap {
      height: 2px;
      background: var(--border);
      margin-bottom: 28px;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Label */
    .label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: block;
    }
    .label.accent { color: var(--accent); }

    /* Question text */
    .q-jp {
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      margin-bottom: 8px;
    }
    .q-en {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* Option buttons */
    .opt-btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 13px 16px;
      margin-bottom: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      color: var(--text);
    }
    .opt-btn:hover {
      border-color: var(--border2);
      background: rgba(255,255,255,0.04);
    }
    .opt-btn.selected {
      background: var(--accent-bg);
      border-color: var(--accent-border);
    }
    .opt-btn.selected .opt-jp { color: var(--accent); }
    .opt-btn.selected .opt-en { color: var(--accent); opacity: 0.7; }
    .opt-btn.selected .opt-arrow { color: var(--accent); }

    .opt-jp { font-size: 14px; font-weight: 500; color: var(--text); }
    .opt-en { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .opt-arrow { font-size: 16px; color: var(--muted); flex-shrink: 0; }

    /* Two-column grid for options */
    .opt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 4px;
    }
    .opt-grid .opt-btn { margin-bottom: 0; }

    /* Recall box */
    .recall {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 24px;
    }
    .recall-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .recall-val { font-size: 14px; font-weight: 500; color: var(--text); }

    /* Slider section */
    .slider-wrap {
      margin-top: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .slider-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .slider-label { font-size: 13px; color: var(--muted); }
    .slider-val {
      font-family: 'DM Mono', monospace;
      font-size: 26px;
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
    }
    .slider-weight {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      margin-top: 3px;
    }
    input[type=range] {
      width: 100%;
      height: 4px;
      appearance: none;
      background: var(--border2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .slider-hints {
      display: flex;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Buttons */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 14px;
      margin-top: 18px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0e0e0f;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }

    .btn-ghost {
      display: block;
      width: 100%;
      padding: 13px;
      margin-top: 10px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

    /* Welcome */
    .welcome-wrap {
      padding: 48px 24px;
      text-align: center;
    }
    .welcome-icon {
      font-size: 40px;
      margin-bottom: 20px;
      display: block;
    }
    .welcome-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 19px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .welcome-sub {
      font-size: 12px;
      color: var(--muted);
      max-width: 380px;
      margin: 0 auto 28px;
      line-height: 1.7;
    }

    /* Result */
    .result-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
      text-align: center;
      margin-bottom: 4px;
    }
    .result-sub {
      font-family: 'Noto Serif JP', serif;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 28px;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-val {
      font-family: 'DM Mono', monospace;
      font-size: 26px;
      font-weight: 500;
      color: var(--text);
    }
    .score-card {
      grid-column: 1 / -1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .score-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .score-val {
      font-family: 'DM Mono', monospace;
      font-size: 34px;
      font-weight: 500;
    }
    .score-icon { font-size: 30px; }

    .title-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      text-align: center;
      margin: 12px 0 14px;
    }
    .title-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .title-jp {
      font-family: 'Noto Serif JP', serif;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .title-en {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate { animation: fadeUp 0.3s ease forwards; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState } = React;

// Mock ground-truth data for scoring (demo only)
const mockTruths = {
  1: { majorityOption: 'A' },
  2: { 'A': 'B', 'B': 'D', 'C': 'A' },
  3: { ranks: { 'C': 1, 'B': 2, 'A': 3, 'D': 4 } },
  4: { majorityOption: 'A' },
  5: { over50: 'A' }
};

const questions = [
  {
    id: 1,
    type1: {
      q: { jp: '2026年より施行された「税金や社会保険料を滞納した外国人の永住権を取り消す」新制度について、あなたはどう思いますか？', en: 'What is your opinion on the new system that revokes permanent residency of foreign nationals who fail to pay taxes or social insurance?' },
      options: [{ val: 'A', jp: '賛成', en: 'Support' }, { val: 'B', jp: '中立', en: 'Neutral' }, { val: 'C', jp: '反対', en: 'Oppose' }]
    },
    type2: {
      q: { jp: 'あなたの回答は「多数派（1位）」だと思いますか？', en: 'Do you think your answer is the "Majority (Rank 1)"?' },
      options: [{ val: 'majority', jp: '多数派', en: 'Majority' }, { val: 'minority', jp: '少数派', en: 'Minority' }],
      evaluator: (t1, t2) => { const isMaj = t1 === mockTruths[1].majorityOption; return t2 === (isMaj ? 'majority' : 'minority'); }
    }
  },
  {
    id: 2,
    type1: {
      q: { jp: '政府が「特定技能ビザ」の対象分野をほぼ全ての産業に拡大したことについて、どう思いますか？', en: 'What do you think about the government expanding the SSW Visa to almost all industries?' },
      options: [{ val: 'A', jp: '賛成', en: 'Support' }, { val: 'B', jp: '中立', en: 'Neutral' }, { val: 'C', jp: '反対', en: 'Oppose' }]
    },
    type2: {
      q: { jp: 'あなたと「同じ回答」を選んだ人は何割くらいいると思いますか？', en: 'What percentage of people chose the same answer as you?' },
      options: [{ val: 'A', jp: '80%以上', en: 'Over 80%' }, { val: 'B', jp: '50%~79%', en: '50–79%' }, { val: 'C', jp: '20%~49%', en: '20–49%' }, { val: 'D', jp: '20%未満', en: 'Under 20%' }],
      evaluator: (t1, t2) => t2 === mockTruths[2][t1]
    }
  },
  {
    id: 3,
    type1: {
      q: { jp: '永住権を持つ外国人に対し、地方選挙での「投票権」を認めるべきだと思いますか？', en: 'Should foreign nationals with permanent residency be granted voting rights in local elections?' },
      options: [{ val: 'A', jp: '強く賛成', en: 'Strongly Support' }, { val: 'B', jp: '賛成', en: 'Support' }, { val: 'C', jp: '反対', en: 'Oppose' }, { val: 'D', jp: '強く反対', en: 'Strongly Oppose' }]
    },
    type2: {
      q: { jp: '一般大衆の間で「最も多く選ばれた」回答はどれだと思いますか？', en: 'Which answer do you think was most frequently chosen by the general public?' },
      options: [{ val: 'A', jp: '強く賛成', en: 'Strongly Support' }, { val: 'B', jp: '賛成', en: 'Support' }, { val: 'C', jp: '反対', en: 'Oppose' }, { val: 'D', jp: '強く反対', en: 'Strongly Oppose' }],
      isRanked: true
    }
  },
  {
    id: 4,
    type1: {
      q: { jp: '全ての就労・配偶者ビザの更新時に、基礎的な「日本語能力テスト」の合格を義務付ける政策を支持しますか？', en: 'Do you support mandating a basic Japanese proficiency test for all work and spouse visa renewals?' },
      options: [{ val: 'A', jp: '支持する', en: 'Support' }, { val: 'B', jp: '支持しない', en: 'Do Not Support' }, { val: 'C', jp: 'わからない', en: 'Not Sure' }]
    },
    type2: {
      q: { jp: 'あなたの回答は「多数派（1位）」ですか？', en: 'Is your answer the "Majority (Rank 1)"?' },
      options: [{ val: 'majority', jp: '多数派', en: 'Majority' }, { val: 'minority', jp: '少数派', en: 'Minority' }],
      evaluator: (t1, t2) => { const isMaj = t1 === mockTruths[4].majorityOption; return t2 === (isMaj ? 'majority' : 'minority'); }
    }
  },
  {
    id: 5,
    type1: {
      q: { jp: '公権力の行使を伴わない地方公務員における、外国籍住民の採用制限撤廃についてどう思いますか？', en: 'What do you think about abolishing employment restrictions for foreign nationals in local public service?' },
      options: [{ val: 'A', jp: '賛成', en: 'Support' }, { val: 'B', jp: '反対', en: 'Oppose' }, { val: 'C', jp: 'わからない', en: "Don't know" }]
    },
    type2: {
      q: { jp: 'この政策に「賛成」している人は日本社会で過半数だと思いますか？', en: 'Do you think over 50% of Japanese society supports this policy?' },
      options: [{ val: 'A', jp: '過半数だと思う', en: 'Yes, over 50%' }, { val: 'B', jp: '過半数ではない', en: 'No, under 50%' }],
      evaluator: (t1, t2) => t2 === mockTruths[5].over50
    }
  }
];

// Weight formula: W = floor(confidence / 10) + 1, range 1–11
const getWeight = (conf) => Math.floor(conf / 10) + 1;

const getTitleData = (score) => {
  if (score < 0)    return { jp: '迷える羊',         en: 'Lost Sheep',                  color: '#7a7870' };
  if (score <= 150) return { jp: '一般市民',         en: 'Ordinary Citizen',            color: '#5b8fd4' };
  if (score <= 300) return { jp: '世論の観察者',     en: 'Observer of Public Opinion',  color: '#5aad87' };
  if (score <= 450) return { jp: 'トレンドリーダー', en: 'Trend Leader',                color: '#9b85d4' };
  return              { jp: '集合知の預言者',         en: 'Prophet of Collective Wisdom', color: '#c8a96e' };
};

function App() {
  const [step, setStep]           = useState('welcome');
  const [qIndex, setQIndex]       = useState(0);
  const [history, setHistory]     = useState([]);
  const [t1Answer, setT1Answer]   = useState(null);
  const [t2Answer, setT2Answer]   = useState(null);
  const [confidence, setConfidence] = useState(50);

  const currentQ   = questions[qIndex];
  const weight     = getWeight(confidence);
  const totalScore = history.reduce((acc, h) => acc + h.score, 0);
  const accuracy   = history.length
    ? Math.round((history.filter(h => h.correct).length / history.length) * 100)
    : 0;
  const alignmentQs   = history.filter(h => [1, 3, 4].includes(h.qId));
  const alignmentRate = alignmentQs.length
    ? Math.round((alignmentQs.filter(h => h.aligned).length / alignmentQs.length) * 100)
    : 0;

  const handleStart = () => {
    setStep('type1'); setQIndex(0); setHistory([]);
    setT1Answer(null); setT2Answer(null); setConfidence(50);
  };

  const handleType1Submit = (val) => {
    setT1Answer(val); setStep('type23');
    setT2Answer(null); setConfidence(50);
  };

  const handleBetSubmit = () => {
    const q = questions[qIndex];
    let scoreEarned = 0;
    let isCorrect   = false;
    let isAligned   = false;

    if ([1, 4].includes(q.id)) isAligned = t1Answer === mockTruths[q.id].majorityOption;
    else if (q.id === 3)       isAligned = t1Answer === 'C';

    if (q.type2.isRanked) {
      // Rank-distance penalty scoring
      const R = mockTruths[3].ranks[t2Answer];
      const N = 4;
      scoreEarned = Math.round(10 * weight - ((R - 1) / (N - 1)) * 20 * weight);
      isCorrect   = R === 1;
    } else {
      isCorrect   = q.type2.evaluator(t1Answer, t2Answer);
      scoreEarned = isCorrect ? 10 * weight : -(10 * weight);
    }

    const newHistory = [...history, {
      qId: q.id, t1: t1Answer, t2: t2Answer,
      conf: confidence, score: scoreEarned,
      correct: isCorrect, aligned: isAligned
    }];
    setHistory(newHistory);

    if (qIndex < questions.length - 1) {
      setQIndex(qIndex + 1); setStep('type1'); setT1Answer(null);
    } else {
      setStep('result');
    }
  };

  const e   = React.createElement;
  const progress = ((qIndex + (step === 'result' ? 1 : 0)) / questions.length) * 100;
  const titleData = getTitleData(totalScore);

  // Header (shared across all steps)
  const header = e('div', { className: 'header' },
    e('div', { className: 'header-title' },
      '世論の鏡', e('span', null, '| Mirror of Public Opinion')
    ),
    step !== 'welcome' && step !== 'result'
      ? e('span', { className: 'badge' }, `Q ${qIndex + 1} / ${questions.length}`)
      : null
  );

  // Welcome screen
  const welcome = e('div', { className: 'welcome-wrap animate' },
    e('span', { className: 'welcome-icon' }, '🪞'),
    e('h1', { className: 'welcome-title' }, 'あなたは日本社会を', e('br'), 'どこまで理解していますか？'),
    e('p', { className: 'welcome-sub' },
      "This is not a regular survey. Predict how the majority thinks about Japan's foreign policies. Bet your confidence, earn points, and discover your true social awareness."
    ),
    e('button', { className: 'btn-primary', onClick: handleStart }, 'ゲームを開始する  →')
  );

  // Step 1: personal opinion
  const type1 = e('div', { className: 'body animate', key: `t1-${qIndex}` },
    e('div', { className: 'progress-wrap' }, e('div', { className: 'progress-bar', style: { width: `${progress}%` } })),
    e('span', { className: 'label accent' }, 'Step 1 — Your opinion'),
    e('p', { className: 'q-jp' }, currentQ.type1.q.jp),
    e('p', { className: 'q-en' }, currentQ.type1.q.en),
    currentQ.type1.options.map(opt =>
      e('button', { key: opt.val, className: 'opt-btn', onClick: () => handleType1Submit(opt.val) },
        e('div', null,
          e('div', { className: 'opt-jp' }, opt.jp),
          e('div', { className: 'opt-en' }, opt.en)
        ),
        e('span', { className: 'opt-arrow' }, '›')
      )
    )
  );

  // Step 2+3: meta-prediction and confidence bet
  const recallOpt = currentQ && currentQ.type1.options.find(o => o.val === t1Answer);
  const type23 = e('div', { className: 'body animate', key: `t23-${qIndex}` },
    e('div', { className: 'progress-wrap' }, e('div', { className: 'progress-bar', style: { width: `${progress + (1 / questions.length) * 50}%` } })),
    e('div', { className: 'recall' },
      e('div', { className: 'recall-label' }, 'Your choice'),
      e('div', { className: 'recall-val' }, recallOpt ? `${recallOpt.jp}  (${recallOpt.en})` : '')
    ),
    e('span', { className: 'label accent' }, 'Step 2 — Meta-prediction'),
    e('p', { className: 'q-jp' }, currentQ.type2.q.jp),
    e('p', { className: 'q-en' }, currentQ.type2.q.en),
    e('div', { className: 'opt-grid' },
      currentQ.type2.options.map(opt =>
        e('button', {
          key: opt.val,
          className: `opt-btn${t2Answer === opt.val ? ' selected' : ''}`,
          onClick: () => setT2Answer(opt.val)
        },
          e('div', null,
            e('div', { className: 'opt-jp' }, opt.jp),
            e('div', { className: 'opt-en' }, opt.en)
          )
        )
      )
    ),
    t2Answer && e('div', { className: 'slider-wrap' },
      e('div', { className: 'slider-row' },
        e('div', null,
          e('div', { style: { fontSize: 13, fontWeight: 500, color: 'var(--text)', marginBottom: 3 } }, 'Confidence'),
          e('div', { className: 'slider-label' }, 'Higher confidence = higher reward / risk')
        ),
        e('div', { style: { textAlign: 'right' } },
          e('div', { className: 'slider-val' }, `${confidence}%`),
          e('div', { className: 'slider-weight' }, `Weight ×${weight}`)
        )
      ),
      e('input', {
        type: 'range', min: 0, max: 100, step: 5,
        value: confidence,
        onChange: ev => setConfidence(parseInt(ev.target.value))
      }),
      e('div', { className: 'slider-hints' },
        e('span', null, '0% — low risk'),
        e('span', null, '100% — high reward')
      ),
      e('button', { className: 'btn-primary', onClick: handleBetSubmit }, 'Place Bet  →')
    )
  );

  // Result screen
  const result = e('div', { className: 'body animate' },
    e('div', { className: 'progress-wrap' }, e('div', { className: 'progress-bar', style: { width: '100%' } })),
    e('p', { className: 'result-title' }, 'Your Social Radar'),
    e('p', { className: 'result-sub' }, 'あなたの社会レーダー'),
    e('div', { className: 'stat-grid' },
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, 'Accuracy'),
        e('div', { className: 'stat-val' }, `${accuracy}%`)
      ),
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, 'Maj. Alignment'),
        e('div', { className: 'stat-val' }, `${alignmentRate}%`)
      ),
      e('div', { className: 'score-card' },
        e('div', null,
          e('div', { className: 'score-label' }, 'Total Score'),
          e('div', {
            className: 'score-val',
            style: { color: totalScore >= 0 ? 'var(--success)' : 'var(--danger)' }
          }, `${totalScore > 0 ? '+' : ''}${totalScore} pts`)
        ),
        e('span', { className: 'score-icon' }, '🏆')
      )
    ),
    e('div', { className: 'title-card' },
      e('div', { className: 'title-label' }, 'Final Title'),
      e('div', { className: 'title-jp', style: { color: titleData.color } }, titleData.jp),
      e('div', { className: 'title-en' }, titleData.en)
    ),
    e('button', { className: 'btn-ghost', onClick: handleStart }, 'Play Again')
  );

  return e('div', null,
    e('div', { className: 'card' },
      header,
      step === 'welcome' && welcome,
      step === 'type1'   && type1,
      step === 'type23'  && type23,
      step === 'result'  && result
    ),
    e('p', { className: 'footer' }, 'Data simulation for concept demonstration only.')
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
